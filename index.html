<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpsFlow.sh - Architecture Governance for the FINOS Ecosystem</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%233c83f6' width='100' height='100'/><text x='50' y='65' font-size='70' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>⚙</text></svg>"
    />
  </head>

  <body>
    <script>
      // Decode path encoded by 404.html and restore to browser history
      // so React Router picks up the correct route on direct navigation.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            decoded.shift() +
              (decoded.length ? "?" + decoded.join("&") : "") +
              l.hash
          );
        }
      })(window.location);
    </script>
    <!-- Hidden form for Netlify bot detection (React SPA workaround) -->
    <form name="academy-interest" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="track">
        <option value="associate">Associate</option>
        <option value="practitioner">Practitioner</option>
        <option value="architect">Architect</option>
      </select>
      <select name="format">
        <option value="self-paced">Self-Paced Online</option>
        <option value="live-workshop">Live Workshop</option>
        <option value="corporate">Corporate / In-House</option>
      </select>
    </form>

    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
